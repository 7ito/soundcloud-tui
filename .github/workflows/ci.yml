name: ci

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
            command: cargo test --locked
          - name: macos-aarch64
            os: macos-14
            command: cargo build --locked
          - name: windows-x86_64
            os: windows-latest
            command: cargo build --locked

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libdbus-1-dev libpipewire-0.3-dev pkg-config

      - name: Run Cargo command
        run: ${{ matrix.command }}
